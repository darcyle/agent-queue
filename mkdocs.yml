site_name: Agent Queue Documentation
site_description: Documentation for Agent Queue — a task queue and orchestrator for AI coding agents
site_url: https://electricjack.github.io/agent-queue/
repo_url: https://github.com/ElectricJack/agent-queue
repo_name: ElectricJack/agent-queue

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.top
    - search.highlight
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - def_list

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Specifications:
      - Core:
          - Models & State Machine: specs/models-and-state-machine.md
          - Configuration: specs/config.md
          - Main Entry Point: specs/main.md
          - Database: specs/database.md
      - Orchestration:
          - Orchestrator: specs/orchestrator.md
          - Scheduler & Budget: specs/scheduler-and-budget.md
          - Plan Parser: specs/plan-parser.md
          - Hooks: specs/hooks.md
          - Event Bus: specs/event-bus.md
      - Interfaces:
          - Chat Agent: specs/chat-agent.md
          - Command Handler: specs/command-handler.md
          - Chat Providers: specs/chat-providers/providers.md
      - Infrastructure:
          - Adapters — Claude: specs/adapters/claude.md
          - Git Manager: specs/git/git.md
  - API Reference:
      - Overview: api/index.md
      - Core:
          - Models: api/models.md
          - Config: api/config.md
          - Database: api/database.md
          - State Machine: api/state_machine.md
          - Main: api/main.md
      - Orchestration:
          - Orchestrator: api/orchestrator.md
          - Scheduler: api/scheduler.md
          - Event Bus: api/event_bus.md
          - Plan Parser: api/plan_parser.md
          - Hooks: api/hooks.md
      - Adapters:
          - Base Adapter: api/adapters/base.md
          - Claude Adapter: api/adapters/claude.md
      - Chat Providers:
          - Anthropic: api/chat_providers/anthropic.md
          - Ollama: api/chat_providers/ollama.md
      - Discord:
          - Bot: api/discord/bot.md
          - Commands: api/discord/commands.md
          - Notifications: api/discord/notifications.md
      - Git:
          - Manager: api/git/manager.md
      - Tokens:
          - Budget: api/tokens/budget.md
          - Tracker: api/tokens/tracker.md

# Alembic configuration for agent-queue schema migrations.
#
# Usage:
#   alembic revision --autogenerate -m "description"   # generate migration
#   alembic upgrade head                                # apply all migrations
#   alembic current                                     # show current revision
#   alembic history                                     # show migration chain

[alembic]
script_location = %(here)s/migrations
prepend_sys_path = .
path_separator = os

# Database URL is set programmatically in env.py via AGENT_QUEUE_DB_URL
# or defaults to sqlite+aiosqlite:///~/.agent-queue/agent-queue.db
sqlalchemy.url =

# Run ruff on generated migration files
[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_queue
      POSTGRES_USER: agent_queue
      POSTGRES_PASSWORD: agent_queue_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_queue"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

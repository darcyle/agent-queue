[project]
name = "agent-queue"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "aiosqlite>=0.20.0",
    "discord.py>=2.6.0",
    "claude-agent-sdk>=0.1.37",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
telegram = [
    "python-telegram-bot[ext]>=20.0",
]
mcp = [
    "mcp>=1.0.0",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4.0",
]
memory = [
    "memsearch>=0.1.0",
]
docs = [
    "mkdocs>=1.6",
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.27",
]

[project.scripts]
agent-queue = "src.main:main"

[tool.setuptools.packages.find]
where = ["."]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "functional: tests that launch real Claude CLI (require auth + API key)",
    "functional_mcp: functional tests requiring npm/npx for MCP servers",
    "integration: tests requiring external dependencies (memsearch, Milvus Lite, etc.)",
]

[tool.ruff]
target-version = "py312"
line-length = 100
